<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbus Company: Don Quixote [HERO] Battle Mission</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 680px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #df2020; 
            box-shadow: 0 4px 15px rgba(223, 32, 32, 0.3);
        }
        h1 { color: #df2020; margin-bottom: 5px; letter-spacing: 2px; }
        p.subtitle { color: #aaa; font-style: italic; margin-top: 0; font-size: 14px; }
        
        .screen { display: none; }
        .active-screen { display: block; }

        .identity-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }
        .identity-card {
            background: #252525;
            border: 2px solid #444;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
        }
        .identity-card:hover {
            border-color: #ffeb3b;
            background: #2e2e2e;
        }
        .identity-card.selected {
            border-color: #df2020;
            background: #331515;
            box-shadow: 0 0 10px rgba(223, 32, 32, 0.4);
        }
        .identity-card h4 { margin: 0 0 5px 0; color: #fff; }
        .identity-card p { margin: 0; font-size: 13px; color: #aaa; }

        .control-panel {
            text-align: left;
            background: #151515;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        label { display: block; margin-top: 10px; font-weight: bold; color: #ffeb3b; }
        select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 5px; border: 1px solid #444; background-color: #2a2a2a; color: white; font-size: 16px; box-sizing: border-box; }
        
        .status-display {
            display: flex;
            justify-content: space-between;
            background: #1a2a1a;
            border: 1px solid #444;
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .sp-value { color: #4caf50; font-size: 18px; }

        .enemy-board { background: #261111; border: 1px solid #ff4444; padding: 15px; border-radius: 8px; margin: 15px 0; text-align: left;}
        .hp-bar-bg { background: #444; width: 100%; height: 20px; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .hp-bar-fill { background: #df2020; width: 100%; height: 100%; transition: width 0.3s ease; }

        .music-btn { background-color: #ff4500; color: white; font-weight: bold; margin-bottom: 15px; border: 2px solid #ffcc00; box-shadow: 0 0 15px rgba(255, 69, 0, 0.6); letter-spacing: 1px; cursor: pointer; }
        .music-btn:hover { background-color: #e03e00; box-shadow: 0 0 20px rgba(255, 69, 0, 0.9); }

        .btn-action { background-color: #df2020; color: white; font-weight: bold; font-size: 18px; margin-top: 15px; border: none; cursor: pointer;}
        .btn-action:hover { background-color: #b31616; }
        .btn-back { background-color: #555; color: white; margin-top: 10px; border: none; cursor: pointer;}
        .btn-back:hover { background-color: #444; }
        button:disabled { background-color: #333; color: #777; cursor: not-allowed; }
        
        .coin-stage { display: flex; justify-content: center; gap: 15px; margin: 20px 0; min-height: 80px; flex-wrap: wrap; }
        .coin-wrapper { perspective: 1000px; width: 65px; height: 65px; }
        .coin-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.1s linear; }
        .coin-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .coin-front { background: radial-gradient(circle, #ffe066 0%, #b38600 100%); color: #4a3600; border: 3px solid #ffcc00; }
        .coin-back { background: radial-gradient(circle, #e0e0e0 0%, #757575 100%); color: #212121; border: 3px solid #bdbdbd; transform: rotateY(180deg); }
        
        .spinning { animation: spin 0.2s linear infinite; }
        @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        .result-box { margin-top: 25px; padding: 20px; background-color: #0b0b0b; border-left: 5px solid #df2020; text-align: left; display: none; border-radius: 0 10px 10px 0; }
        .coin-text { font-weight: bold; }
        .head-text { color: #4caf50; }
        .tail-text { color: #f44336; }
        .final-power { font-size: 20px; color: #ffeb3b; font-weight: bold; margin-top: 10px; }
        .flavor-text { color: #00bcd4; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>L_B_C: DON QUIXOTE BATTLE</h1>
    
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">🔥 PLAY THEME: "HERO" (DON QUIXOTE)</button>
    
    <audio id="themeMusic" loop src="hero.mp3"></audio>

    <div id="selectScreen" class="screen active-screen">
        <p class="subtitle">"จงเลือกอัตลักษณ์ (Identity) ของดอนกิฮอเต้เพื่อเข้าสู่ภารกิจ"</p>
        
        <div class="identity-grid" id="identityGrid"></div>

        <button class="btn-action" id="startBattleBtn" onclick="goToBattleScreen()" disabled>DEPLOY SINNER (เข้าสู่สมรภูมิ)</button>
    </div>

    <div id="battleScreen" class="screen">
        <p class="subtitle" id="activeCharacterTitle">กำลังรบ</p>

        <div class="enemy-board">
            <label for="enemySelect">🎯 เป้าหมายภารกิจ:</label>
            <select id="enemySelect" onchange="changeEnemy()">
                <option value="dummy">หุ่นซ้อมรบธรรมดา (HP: 100)</option>
                <option value="pequod">ลูกเรือ Pequod Town (HP: 250)</option>
                <option value="windmill">ยักษ์กังหันลมในจินตนาการ (BOSS) (HP: 600)</option>
            </select>
            <h3 id="enemyName" style="margin: 10px 0 5px 0; color: #ff4444;">ศัตรู: หุ่นซ้อมรบธรรมดา</h3>
            <div>HP: <span id="enemyHpText">100 / 100</span></div>
            <div class="hp-bar-bg"><div class="hp-bar-fill" id="hpBar"></div></div>
        </div>

        <div class="control-panel">
            <div class="status-display">
                <span>Sanity Point (SP) ปัจจุบัน:</span>
                <span class="sp-value" id="spDisplay">0</span>
            </div>

            <label for="skillSelect">เลือกสกิลใช้งาน:</label>
            <select id="skillSelect"></select>
        </div>

        <button class="btn-action" id="tossButton" onclick="executeCoinToss()">ATTACKศัตรู! ⚔️</button>
        <button class="btn-back" id="backBtn" onclick="goToSelectScreen()">◀ เปลี่ยนตัวละคร</button>

        <div class="coin-stage" id="coinStage"></div>

        <div id="resultBox" class="result-box">
            <h3>[ บันทึกการปะทะ ]</h3>
            <p id="flavorText" class="flavor-text"></p>
            <hr style="border-color: #222;">
            <p id="tossDetails"></p>
            <p id="finalPowerResult" class="final-power"></p>
            <p id="damageResult" style="color: #ff4444; font-weight: bold; font-size: 18px;"></p>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>

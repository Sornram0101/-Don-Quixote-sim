<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limbus Company: Don Quixote Skill Simulator</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #df2020; 
            box-shadow: 0 4px 15px rgba(223, 32, 32, 0.3);
        }
        h1 { color: #df2020; margin-bottom: 5px; letter-spacing: 2px; }
        p.subtitle { color: #aaa; font-style: italic; margin-top: 0; font-size: 14px; }
        
        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
            color: #ffeb3b;
        }
        
        select, input, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            background-color: #df2020;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            margin-top: 20px;
            font-size: 18px;
            letter-spacing: 1px;
        }
        button:hover { 
            background-color: #b31616;
            box-shadow: 0 0 10px rgba(223, 32, 32, 0.5);
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        
        /* สไตล์โซนเหรียญอนิเมชัน */
        .coin-stage {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            min-height: 90px;
            flex-wrap: wrap;
        }
        
        /* เหรียญ 3D */
        .coin-wrapper {
            perspective: 1000px;
            width: 70px;
            height: 70px;
        }
        .coin-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
        }
        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .coin-front {
            background: radial-gradient(circle, #ffe066 0%, #b38600 100%);
            color: #4a3600;
            border: 3px solid #ffcc00;
        }
        .coin-back {
            background: radial-gradient(circle, #e0e0e0 0%, #757575 100%);
            color: #212121;
            border: 3px solid #bdbdbd;
            transform: rotateY(180deg);
        }
        
        /* คลาสสิกอนิเมชันหมุน */
        .spinning {
            animation: spin 0.2s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #0b0b0b;
            border-left: 5px solid #df2020;
            text-align: left;
            display: none;
            border-radius: 0 10px 10px 0;
        }
        
        .coin-text { font-weight: bold; }
        .head-text { color: #4caf50; }
        .tail-text { color: #f44336; }
        .final-power { font-size: 22px; color: #ffeb3b; font-weight: bold; margin-top: 15px; border-top: 1px dashed #444; padding-top: 10px; }
        .flavor-text { color: #00bcd4; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>MANAGER-NIM!!</h1>
    <p class="subtitle">"Justice and righteousness shall pierce through the darkness!" - Don Quixote</p>
    
    <label for="identitySelect">เลือก อัตลักษณ์ (Identity) ของ Don Quixote:</label>
    <select id="identitySelect" onchange="updateSkillOptions()">
        <option value="wCorp">W Corp. L3 Cleanup Agent</option>
        <option value="cinq">Cinq Assoc. South Section 5 Director</option>
        <option value="middleSister">The Middle Little Sister</option>
        <option value="lantern">Lantern E.G.Oist</option>
        <option value="kCorp">K Corp. Class 3 Excision Staff</option>
        <option value="bladeLineage">Blade Lineage Salsu</option>
        <option value="tciAssoc">TCI Association Section 4</option>
        <option value="base">Shi Association South Section 5</option>
    </select>

    <label for="skillSelect">เลือก สกิล (Skill):</label>
    <select id="skillSelect"></select>

    <label for="spInput">ค่าสติ (Sanity Point / SP) [-45 ถึง 45]:</label>
    <input type="number" id="spInput" value="45" min="-45" max="45">

    <button id="tossButton" onclick="executeCoinToss()">USE SKILL! ⚔️</button>

    <div class="coin-stage" id="coinStage"></div>

    <div id="resultBox" class="result-box">
        <h3>[ คัมภีร์บันทึกการต่อสู้ ]</h3>
        <p id="flavorText" class="flavor-text"></p>
        <hr style="border-color: #222;">
        <p id="tossDetails"></p>
        <p id="finalPowerResult" class="final-power"></p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
